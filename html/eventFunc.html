<!DOCTYPE html>
<html lang="ko">
<head>  <!--눈에 보이진 않지만, 웹사이트에 필요한 정보-->
    <meta charset="UTF-8">
    <title>고양이 토글 페이지</title>

    <!--css 파일을 head 태그에 넣어서, 스타일 가이드 선제시-->

</head>

<body>  <!--눈에 보이는 부분-->

         alt="절대경로삼색이" width="400" class="cat">

    <!--js 파일은 브라우저에겐 무거움, 이걸 먼저 만나면 
    다운로드 후 실행하기까지 Html 읽기를 멈춤, 에러 위험-->
    <script src="/yanggggg/js/eventFunc.js"></script>

</html>
