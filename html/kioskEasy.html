<!DOCTYPE html> 
<html lang="ko"> <!--언어는 한국어로 설정-->

<head>
  <meta charset="UTF-8">    <!--문자 인코딩 설정, UTF-8은 유니코드의 한 형태로, 전 세계의 문자들을 표현할 수 있음-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">    <!--반응형 웹 디자인을 위한 뷰포트 설정, 화면의 너비에 맞게 조정-->
  <title>Kiosk Order System(ver.Easy)</title>
</head>

<body>
  <h1>Simple Kiosk</h1>
  <div id="menu">
    <button type="button" data-name="Coffee" data-price="3000">Coffee (3,000원)</button>
    <button type="button" data-name="Tea" data-price="2500">Tea (2,500원)</button>
    <button type="button" data-name="Cake" data-price="4000">Cake    (4,000원)</button>
  </div>
  
  <h2>Cart</h2>
  <div id="cart"></div>

  <p>Total: <span id="total">0</span>원</p>

  <script src="/yanggggg/js/kioskEasy.js"></script>
</body>

</html>
