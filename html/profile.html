<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>あなたは誰ですか？</title>

  <link rel="stylesheet" href="/yanggggg/css/profile.css">

  <script src="https://unpkg.com/@emailjs/browser@4/dist/email.min.js"></script>
</head>

<body>
  <div class="photo-grid">
    <img class="photo" src="/yanggggg/images/IMG_4289.JPG" alt="photo1">
    <img class="photo" src="/yanggggg/images/IMG_2875.JPG" alt="photo2">
    <img class="photo" src="/yanggggg/images/image 250.png" alt="photo3">
  </div>

  <div class="card">
    <h2>あなたは誰ですか？💕</h2>

    <form>
      <div class="form-row">
        <label>자기소개</label>
        <input type="text" name="from_name" placeholder="이름이나 닉네임">
      </div>

      <div class="form-row">
        <label>이메일</label>
        <input type="email" name="email" placeholder="example@email.com">
      </div>

      <div class="form-row">
        <label>인스타 아이디</label>
        <input type="text" name="insta_id" placeholder="@id">
      </div>

      <button id="sendEmail" class="submit-btn">입력완료&gt;&lt;</button>
    </form>
  </div>

  <div id="dimOverlay"></div>
  <div id="toast" class="toast">메시지가 여기에 표시됩니다.</div>
  <script src="/yanggggg/js/profile.js"></script>

  <!--이벤트, 함수부분 연습용 인덱스-->
  <button id="yuushi_toggle_btn">버튼을 누르면 유우시가 나옵니다</button>
  <img src="/yanggggg/images/IMG_4289.JPG" alt="유우시 사진 랜덤" class="yuushi_photo">
  
  <script src="/yanggggg/js/profile.js"></script>


  <!--키오스크 코딩 응용: 버튼 누를시 방문자수 증가 업데이트-->
  <div id="visitor-badge">
    방문자 수: <span id="visitor-count">0</span>명
  </div>

  <button id="submit-btn">입력완료>&lt;</button>
</body>

</html>
