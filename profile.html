<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>あなたは誰ですか？</title>

  <link rel="stylesheet" href="profile.css">

  <script src="https://unpkg.com/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

  <div class="photo-grid">
    <img class="photo" src="/yanggggg/images/IMG_4289.JPG" alt="photo1">
    <img class="photo" src="/yanggggg/images/image 250.png" alt="photo2">
    <img class="photo" src="/yanggggg/images/IMG_2875.JPG" alt="photo3">
  </div>

  <div class="card">
    <h2>あなたは誰ですか？💕</h2>

    <form>
      <div class="form-row">
        <label>자기소개</label>
        <input type="text" name="from_name" placeholder="이름이나 닉네임">
      </div>

      <div class="form-row">
        <label>이메일</label>
        <input type="email" name="email" placeholder="example@email.com">
      </div>

      <div class="form-row">
        <label>인스타 아이디</label>
        <input type="text" name="insta_id" placeholder="@id">
      </div>

      <button id="sendEmail" class="submit-btn">입력완료&gt;&lt;</button>
    </form>
  </div>

  <div id="dimOverlay"></div>

  <div id="toast" class="toast">메시지가 여기에 표시됩니다.</div>

  <script src="profile.js"></script>

</body>
</html>
