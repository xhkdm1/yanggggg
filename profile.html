<!DOCTYPE html>
<html lang="ko"> <!-- 한국어 설정 -->
<head>  <!-- 웹 페이지의 메타데이터 설정, 문자 인코딩, 뷰포트, 제목, CSS 연결 -->
    <meta charset="UTF-8">  <!-- 문자 인코딩 설정, 메타태그 charset -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!-- 반응형 웹 디자인을 위한 뷰포트 설정 -->
    <title>혜진 프로필</title>  <!-- 웹 페이지 제목 설정 -->
    <link rel="stylesheet" href="style.css">    <!-- CSS 파일 연결, 상대경로, 가장 후순위 배치 -->
</head>

<body>  <!-- 눈에 보이는 웹 페이지의 진짜 내용물 시작 -->
    <div class="header-bg">     <!-- 헤더 배경 이미지 설정을 위한 바탕 상자, CSS 클래스 header-bg -->
         <div class="profile-container">    <!--사진을 동그랗게 깎기 위한 사진 전용 상자-->
        <img src="/yanggggg/images/Jungwon.jpg" alt="profile-img 사진" class="profile-img" width="200"> </div>   <!--실제 사진 불러오는 태그, src: 사진 주소, alt: 사진이 안 나올 때의 대체 텍스트 -->
        <div class="profile-card">  <!-- 프로필 카드(이름_name, 정보_info-container가 들어감), CSS 클래스 profile-card -->
            <h1 class="name">저는 정원이에요.</h1>  <!-- 이름을 나타내는 제목 태그, CSS 클래스 name -->
            <ul class="info-container"> <!-- 정보 목록을 담는 컨테이너, CSS 클래스 info-container, ul과 li는 세트 -->
                <li class="info-item">자기소개</li>
                <li class="info-item">이메일</li>
                <li class="info-item">인스타그램 아이디</li>
            </ul>
        </div>
    </div>
</body>
</html>
